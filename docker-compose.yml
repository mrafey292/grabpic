services:
  db:
    image: pgvector/pgvector:pg16   # postgres 16 with pgvector pre-installed, free
    container_name: grabpic_db
    environment:
      POSTGRES_USER: grabpic
      POSTGRES_PASSWORD: grabpic
      POSTGRES_DB: grabpic
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grabpic"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
