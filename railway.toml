[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "gunicorn run:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --access-logfile -"
healthcheckPath = "/health"
healthcheckTimeout = 300    # generous timeout — first boot builds the image
restartPolicyType = "on_failure"

[environments.production.variables]
FLASK_ENV = "production"
